# Casper's Wasm VM rejects post-MVP features (bulk-memory, sign-ext). Build the
# contract crate against the MVP feature set; cargo-odra + wasm-opt then do the
# final lowering. Scoped to wasm32 so native `cargo test` (the OdraVM unit tests)
# is unaffected.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=-bulk-memory,-sign-ext"]
